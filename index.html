# Frequency and contingency tables

- Contingency tables: Describe the frequency of two or more than two categorical variables

# Epidemiological examples 

A case control study in a hospital with .red[100] COVID-19 cases and .red[100] non COVID-19 patients. The investigator asked both COVID-19 and non COVID-19 patients if they had been to a wet market in the last 2 weeks before the onset of the symptom. The investigation results was shown as below 


&lt;table style="text-align:center"&gt;&lt;caption&gt;&lt;strong&gt;Contingency tabel&lt;/strong&gt;&lt;/caption&gt;
&lt;tr&gt;&lt;td colspan="3" style="border-bottom: 1px solid black"&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td style="text-align:left"&gt;&lt;/td&gt;&lt;td&gt;COVID-19 cases&lt;/td&gt;&lt;td&gt;non-COVID-19 cases&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td colspan="3" style="border-bottom: 1px solid black"&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td style="text-align:left"&gt;Been to wet market&lt;/td&gt;&lt;td&gt;20&lt;/td&gt;&lt;td&gt;15&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td style="text-align:left"&gt;Not been to wet market&lt;/td&gt;&lt;td&gt;80&lt;/td&gt;&lt;td&gt;85&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td colspan="3" style="border-bottom: 1px solid black"&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;

Is the exposure to wet market associated with COVID-19?

`$$\text{Odds ratio} = \frac{ad}{bc} = \frac{20*85}{15*80} = 1.42$$`
`$$\chi^2 = \frac{n(ad-bc)^2}{(a+c)(b+d)(a+b)(c+d)}= \frac{200*(20*85-15*80)^2}{100*100*35*165}=0.86$$`
---


```r
chisq.test(a, correct = FALSE)
```

```

	Pearson's Chi-squared test

data:  a
X-squared = 0.8658, df = 1, p-value = 0.3521
```

# Overview of `\(\chi^2\)` test

.panelset[
.panel[.panel-name[Table]

```r
dtarth2 &lt;- dtarth %&gt;%
  mutate(dimproved = if_else(Improved == "Some" | Improved == "Marked", 1, 0)) %&gt;%
  mutate(dimproved = factor(dimproved, labels =  c("None", "Improved")))

mytable4 &lt;- xtabs(~ Treatment + dimproved, data = dtarth2)
mytable4
```

```
         dimproved
Treatment None Improved
  Placebo   29       14
  Treated   13       28
```

```r
prop.table(mytable4,1)
```

```
         dimproved
Treatment      None  Improved
  Placebo 0.6744186 0.3255814
  Treated 0.3170732 0.6829268
```
]

.panel[.panel-name[chi-squre formula]


```
         dimproved
Treatment None Improved
  Placebo   29       14
  Treated   13       28
```

```
         dimproved
Treatment None Improved
  Placebo 21.5     21.5
  Treated 20.5     20.5
```

```
[1] 0.002243769
```

`$$\chi^2 = \sum \frac{(O-E)^2}{E}= \frac{(29-21.5)^2}{25} + \frac{(14-21.5)^2}{21.5} + \frac{(13-20.5)^2}{20.5} + \frac{(28-20.5)^2}{20.5} = 9.3386$$`

]

.panel[.panel-name[Chi-squre distribution]

&lt;img src="index_files/figure-html/unnamed-chunk-15-1.png" height="400" style="display: block; margin: auto;" /&gt;
]


.panel[.panel-name[Chi-square]


```r
chisq.test(mytable4)
```

```

	Pearson's Chi-squared test with Yates' continuity correction

data:  mytable4
X-squared = 9.3386, df = 1, p-value = 0.002244
```


```r
fisher.test(mytable4) # when sample size is small, say &lt; 30
```

```

	Fisher's Exact Test for Count Data

p-value = 0.002056
alternative hypothesis: true odds ratio is not equal to 1
95 percent confidence interval:
  1.631439 12.374422
sample estimates:
odds ratio

```

# McNemar's `\(\chi^2\)`

Repeated measures of a binary outcome or match study

651 students had psychological assessment of their depression status twice: One was at beginning of the semester, and the other at the end of semester. The results are presented below 


&lt;table style="text-align:center"&gt;&lt;tr&gt;&lt;td colspan="3" style="border-bottom: 1px solid black"&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td style="text-align:left"&gt;&lt;/td&gt;&lt;td&gt;Not.Depressed&lt;/td&gt;&lt;td&gt;Depressed&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td colspan="3" style="border-bottom: 1px solid black"&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td style="text-align:left"&gt;Not Depressed&lt;/td&gt;&lt;td&gt;146&lt;/td&gt;&lt;td&gt;155&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td style="text-align:left"&gt;Depressed&lt;/td&gt;&lt;td&gt;47&lt;/td&gt;&lt;td&gt;303&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td colspan="3" style="border-bottom: 1px solid black"&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;

Are the results of these two related? 

`$$McNemar's \chi^2 = \frac{(n_{21}-n_{12})^2}{n_{21}+n_{12}} = \frac{(155-47)^2}{155+47} = 57.74$$`

# McNemar test in R 


```r
nd2 &lt;- read.csv("https://people.brandeis.edu/~wuzengcn/webm/McNemar.csv", row.names = 1)
*mnd2 &lt;- as.matrix(nd2)
mnd2
```

```
               Not.Depressed Depressed
Not Depressed            146       155
Depressed                 47       303
```

```r
mcnemar.test(mnd2)
```

```

	McNemar's Chi-squared test with continuity correction

data:  mnd2
McNemar's chi-squared = 56.678, df = 1, p-value = 5.133e-14
```

      text = code.textContent;

          /^\\begin\{([^}]+)\}(.|\s)+\\end\{[^}]+\}$/.test(text)) {
        code.outerHTML = code.innerHTML;  // remove <code></code>
        continue;
      }
    }
    i++;
  }
};
